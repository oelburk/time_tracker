name: time_tracker
description: A macOS menu bar time tracker for coding and meetings.
publish_to: none
version: 1.0.0+1

environment:
  sdk: ^3.11.0

resolution: workspace

dependencies:
  flutter:
    sdk: flutter
  app_ui:
    path: ../packages/app_ui
  time_tracking_repository:
    path: ../packages/time_tracking_repository
  settings_repository:
    path: ../packages/settings_repository
  flutter_bloc: ^9.1.0
  bloc: ^9.0.0
  equatable: ^2.0.7
  go_router: ^15.1.2
  tray_manager: ^0.2.0
  window_manager: ^0.5.1
  hotkey_manager: ^0.2.3
  fl_chart: ^1.2.0
  intl: ^0.20.2
  path_provider: ^2.1.5
  path: ^1.9.1
  csv: ^6.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/icons/
